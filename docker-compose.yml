# Full stack — db + backend + frontend together.
#
#   docker compose up --build
#
# Each service is defined in its own file so it can also be started on its own
# (see compose.db.yml / compose.backend.yml / compose.frontend.yml). This root
# file composes them and adds startup ordering for the all-in-one experience.
include:
  - compose.db.yml
  - compose.backend.yml
  - compose.frontend.yml

services:
  backend:
    depends_on:
      db:
        condition: service_healthy

  frontend:
    depends_on:
      - backend
