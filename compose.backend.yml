# Backend (PHP API) service — standalone, independently initiable.
#
#   docker compose -f compose.backend.yml up
#
# Reaches the database over a published host port (DB_HOST/DB_PORT), so it does
# not need to share a Docker network with the db — start it on its own, point it
# at any reachable Postgres, and run several instances side by side:
#
#   APP_DB=prod APP_ENV=prod BACKEND_PORT=8081 \
#     docker compose -p home_hub_prod -f compose.backend.yml up
#
#   APP_DB=test BACKEND_PORT=8082 \
#     docker compose -p home_hub_test -f compose.backend.yml up
services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      # Runtime context for THIS instance (db + environment).
      APP_DB: ${APP_DB:-demo}
      APP_ENV: ${APP_ENV:-demo}
      # How this instance reaches Postgres (published host port by default).
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${POSTGRES_DB:-demo}
      # Each db context connects to its own database.
      DB_NAME_DEMO: ${POSTGRES_DB:-demo}
      DB_NAME_PROD: ${POSTGRES_PROD_DB:-prod}
      DB_NAME_TEST: ${POSTGRES_TEST_DB:-test}
      DB_USER: ${POSTGRES_USER:-home_hub}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-home_hub}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend:/var/www/html
    extra_hosts:
      # Lets host.docker.internal resolve to the host on Linux too.
      - "host.docker.internal:host-gateway"
